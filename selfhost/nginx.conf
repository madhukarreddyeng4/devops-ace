# /etc/nginx/sites-available/madhuops
# Install:
#   sudo cp selfhost/nginx.conf /etc/nginx/sites-available/madhuops
#   sudo ln -sf /etc/nginx/sites-available/madhuops /etc/nginx/sites-enabled/madhuops
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Uses your existing wildcard cert at /etc/certs/{fullchain,privkey}.pem
# (no certbot needed). Make sure both files are readable by nginx:
#   sudo chown root:root /etc/certs/*.pem
#   sudo chmod 644 /etc/certs/fullchain.pem
#   sudo chmod 600 /etc/certs/privkey.pem
#
# DNS at registrar:
#   A   course.madhukarreddy.com       -> <EC2 elastic IP>
#   A   api-course.madhukarreddy.com   -> <EC2 elastic IP>
#
# In selfhost/.env:
#   SITE_URL=https://course.madhukarreddy.com
#   API_EXTERNAL_URL=https://api-course.madhukarreddy.com
#   ADDITIONAL_REDIRECT_URLS=https://course.madhukarreddy.com/**

# ── Shared SSL settings ────────────────────────────────────────────────
ssl_protocols           TLSv1.2 TLSv1.3;
ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache       shared:SSL:10m;
ssl_session_timeout     1d;
ssl_session_tickets     off;

# ── Redirect all HTTP → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name course.madhukarreddy.com api-course.madhukarreddy.com;
    return 301 https://$host$request_uri;
}

# ── Frontend: course.madhukarreddy.com ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name course.madhukarreddy.com;

    ssl_certificate     /etc/certs/fullchain.pem;
    ssl_certificate_key /etc/certs/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API (Auth + REST + Edge Functions via Kong): api-course.madhukarreddy.com ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-course.madhukarreddy.com;

    ssl_certificate     /etc/certs/fullchain.pem;
    ssl_certificate_key /etc/certs/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Edge functions can stream long responses
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
