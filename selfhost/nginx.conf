# /etc/nginx/sites-available/madhuops
# After copying, edit the two server_name lines to your real domains, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d madhuops.example.com -d api.madhuops.example.com

# ── Frontend ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name madhuops.example.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API (Supabase Kong) ────────────────────────────────────────────────
server {
    listen 80;
    server_name api.madhuops.example.com;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Edge functions can stream
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
