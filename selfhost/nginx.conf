# /etc/nginx/sites-available/madhuops
# Install:
#   sudo cp selfhost/nginx.conf /etc/nginx/sites-available/madhuops
#   sudo ln -sf /etc/nginx/sites-available/madhuops /etc/nginx/sites-enabled/madhuops
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d course.madhukarreddy.com -d api-course.madhukarreddy.com
#
# DNS (at your registrar):
#   A   course.madhukarreddy.com       -> <EC2 elastic IP>
#   A   api-course.madhukarreddy.com   -> <EC2 elastic IP>
#
# After certbot finishes, also set in selfhost/.env on the EC2 box:
#   SITE_URL=https://course.madhukarreddy.com
#   API_EXTERNAL_URL=https://api-course.madhukarreddy.com
#   ADDITIONAL_REDIRECT_URLS=https://course.madhukarreddy.com/**
# then: cd selfhost && docker compose up -d

# ── Frontend (course.madhukarreddy.com) ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name course.madhukarreddy.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    # gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API: Auth + REST + Edge Functions via Kong (api-course.madhukarreddy.com) ──
server {
    listen 80;
    listen [::]:80;
    server_name api-course.madhukarreddy.com;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Edge functions can stream long responses
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
